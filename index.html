<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashForge</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>HashForge</h1>

    <p class="subtitle">
        Generate and verify cryptographic hashes.
    </p>

    <textarea
        id="inputText"
        placeholder="Enter text to hash..."></textarea>

    <button onclick="generateHashes()">
        Generate Hashes
    </button>

    <div id="results"></div>

<hr>

<div class="verify-section">

    <h2>Verify Hash</h2>

    <!-- textareas here -->

</div>

<textarea
    id="verifyText"
    class="verify-box"
    placeholder="Enter original text"></textarea>

<textarea
    id="verifyHash"
    class="verify-box"
    placeholder="Paste hash to verify"></textarea>

<button onclick="verifyHash()">
    Verify Hash
</button>

<div id="verifyResult"></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="script.js"></script>

</body>

</html>
